worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Allow large telemetry file uploads
    client_max_body_size 500M;
    client_body_timeout  120s;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # Docker's embedded DNS server — re-resolves on every request so container
    # restarts that change IPs never cause stale-upstream 502s.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    server {
        listen 80;
        server_name _;

# ------------------------------------------------------------------
        # Health check (nginx itself)
        # ------------------------------------------------------------------
        location = /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Variables force nginx to use the resolver on each request rather than
        # caching the IP at startup — containers can restart freely.
        set $api_host      "api:8000";
        set $flower_host   "flower:5555";
        set $frontend_host "frontend:5173";

        # ------------------------------------------------------------------
        # API — proxy to FastAPI
        # ------------------------------------------------------------------
        # Tighter rate limit on auth endpoints (must come before general /api/ block)
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass         http://$api_host$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass         http://$api_host$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ------------------------------------------------------------------
        # Flower — Celery monitoring UI
        # ------------------------------------------------------------------
        location /flower/ {
            proxy_pass         http://$flower_host$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Basic auth for flower in production (configure externally)
            # auth_basic "Restricted";
            # auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # ------------------------------------------------------------------
        # Vite HMR WebSocket (dev mode)
        # ------------------------------------------------------------------
        location /@vite/ {
            proxy_pass         http://$frontend_host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        location /node_modules/ {
            proxy_pass         http://$frontend_host;
            proxy_http_version 1.1;
            proxy_set_header   Host       $host;
        }

        # ------------------------------------------------------------------
        # Frontend — proxy to Vite dev server (SPA routing)
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://$frontend_host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }
    }
}
